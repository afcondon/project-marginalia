# Example services.toml for the e2e test suite.
#
# Tests typically write a per-test scratch services.toml derived
# from this template, substituting absolute paths to the built
# helper binaries (../bin/sleep-and-bind etc.) and per-test ports.
#
# This file is reference only — tests do not load it directly.

[[service]]
name              = "alpha"
tier              = 1
cwd               = "/tmp"
cmd               = ["/abs/path/to/bin/sleep-and-bind", "--port", "31001", "--kind", "tcp"]
port              = 31001
port_kind         = "tcp"
health_timeout_ms = 5000
on_failure        = "warn"
deps              = []
source_paths      = []

[[service]]
name              = "bravo"
tier              = 1
cwd               = "/tmp"
cmd               = ["/abs/path/to/bin/sleep-and-bind", "--port", "31002", "--kind", "tcp"]
port              = 31002
port_kind         = "tcp"
health_timeout_ms = 5000
on_failure        = "warn"
deps              = ["alpha"]
source_paths      = []
