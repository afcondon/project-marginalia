package:
  name: marginalia-capture
  description: "Marginalia Capture — phone-first PWA for quick project captures"
  bundle:
    module: Capture.Main
    outfile: public/bundle.js
    platform: browser
  dependencies:
    - aff
    - aff-promise
    - affjax
    - affjax-web
    - argonaut-codecs
    - argonaut-core
    - arrays
    - console
    - effect
    - either
    - foldable-traversable
    - foreign
    - foreign-object
    - halogen
    - maybe
    - prelude
    - strings
    - tuples
    - web-dom
    - web-html
